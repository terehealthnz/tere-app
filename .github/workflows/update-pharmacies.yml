name: Update pharmacies from Medsafe register

on:
  # 5th of every month at 02:00 UTC (~14:00 NZT). Medsafe publishes the register monthly.
  schedule:
    - cron: '0 2 5 * *'
  # Manual run button.
  workflow_dispatch:

# Needed so the built-in GITHUB_TOKEN can push the refreshed json/csv back to the repo.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install requests openpyxl

      - name: Run build_pharmacy_list.py (json → public/, csv → repo root)
        # Script exits non-zero if the download fails, the parsed list has fewer than
        # 500 records, or it's more than 20% smaller than the currently committed
        # pharmacies.json. Non-zero exit fails this step and therefore the whole job.
        run: |
          python build_pharmacy_list.py \
            --json-out public/pharmacies.json \
            --csv-out pharmacies.csv

      - name: Commit + push if changed
        run: |
          git config user.name 'tere-pharmacy-bot'
          git config user.email 'tere-pharmacy-bot@users.noreply.github.com'
          git add public/pharmacies.json pharmacies.csv
          if git diff --cached --quiet; then
            echo 'No changes to commit — Medsafe register unchanged this month.'
            exit 0
          fi
          COUNT=$(python -c 'import json; print(len(json.load(open("public/pharmacies.json"))))')
          git commit -m "chore(pharmacies): refresh from Medsafe register (${COUNT} entries)"
          git push
