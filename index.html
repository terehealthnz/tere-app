<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tere">
    <meta name="theme-color" content="#0D2B45">
    <link rel="manifest" href="/manifest.json">
    <title>Tere Health — Rural Telehealth Aotearoa</title>
    <meta name="description" content="See a doctor by video or phone — anywhere in NZ. ACC claims, prescriptions and referrals handled on the spot.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/tere-logo.svg">
    <link rel="apple-touch-icon" href="/tere-logo.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Tere Health — Rural Telehealth NZ">
    <meta property="og:description" content="See a doctor by video or phone — anywhere in NZ. ACC claims, prescriptions and referrals handled on the spot.">
    <meta property="og:image" content="https://tere.co.nz/tere-preview.png">
    <meta property="og:url" content="https://tere.co.nz">
    <meta property="og:type" content="website">

    <!-- Twitter / iMessage preview -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://tere.co.nz/tere-preview.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
