<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer background circle -->
  <circle cx="50" cy="50" r="50" fill="#0D2B45"/>
  <!-- Teal border ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#0B6E76" stroke-width="5.5"/>
  <!-- Inner subtle highlight ring -->
  <circle cx="50" cy="50" r="39" fill="none" stroke="#0B6E76" stroke-width="1" opacity="0.3"/>
  <!-- "tere" wordmark -->
  <text
    x="50" y="53"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="30"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle">tere</text>
</svg>
