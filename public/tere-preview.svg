<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Subtle radial glow from centre -->
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0B6E76" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D2B45" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D2B45"/>
  <rect width="1200" height="630" fill="url(#centreGlow)"/>

  <!-- Koru-inspired decorative arcs (top-right, very low opacity) -->
  <g opacity="0.07">
    <circle cx="1100" cy="-40" r="420" fill="none" stroke="#D4EEF0" stroke-width="90"/>
    <circle cx="1100" cy="-40" r="240" fill="none" stroke="#0B6E76" stroke-width="60"/>
    <circle cx="1100" cy="-40" r="100" fill="#0B6E76"/>
  </g>

  <!-- Bottom horizon line -->
  <line x1="0" y1="598" x2="1200" y2="598" stroke="#0B6E76" stroke-width="1.5" opacity="0.25"/>

  <!-- Logo circle mark -->
  <circle cx="600" cy="168" r="52" fill="#0D2B45"/>
  <circle cx="600" cy="168" r="47" fill="none" stroke="#0B6E76" stroke-width="6"/>
  <circle cx="600" cy="168" r="41" fill="none" stroke="#0B6E76" stroke-width="1" opacity="0.3"/>
  <text
    x="600" y="170"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="28"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle">tere</text>

  <!-- Main wordmark: Tere Health -->
  <text
    x="600" y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="90"
    font-weight="400"
    fill="white"
    text-anchor="middle">Tere Health</text>

  <!-- Divider -->
  <line x1="552" y1="325" x2="648" y2="325" stroke="#0B6E76" stroke-width="2"/>

  <!-- Tagline: He tere, he ora -->
  <text
    x="600" y="375"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="36"
    fill="#D4EEF0"
    text-anchor="middle"
    letter-spacing="1.5">He tere, he ora</text>

  <!-- Subtitle -->
  <text
    x="600" y="432"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="rgba(255,255,255,0.5)"
    text-anchor="middle"
    letter-spacing="1">Rural telehealth — anywhere in Aotearoa</text>

  <!-- Domain -->
  <text
    x="600" y="597"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="15"
    font-weight="400"
    fill="rgba(212,238,240,0.45)"
    text-anchor="middle"
    letter-spacing="3">TERE.CO.NZ</text>
</svg>
