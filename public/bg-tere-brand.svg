<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0A2238"/>
      <stop offset="50%" stop-color="#0D2B45"/>
      <stop offset="100%" stop-color="#061828"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0.15" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#0B6E76" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0B6E76" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0.88" cy="0.65" r="0.4">
      <stop offset="0%" stop-color="#0B6E76" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0B6E76" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base navy -->
  <rect width="1280" height="720" fill="url(#navyGrad)"/>

  <!-- Glow zones -->
  <rect width="1280" height="720" fill="url(#glowLeft)"/>
  <rect width="1280" height="720" fill="url(#glowRight)"/>

  <!-- Large decorative circle — top right -->
  <circle cx="1180" cy="-60" r="380" fill="none" stroke="#0B6E76" stroke-width="1" opacity="0.18"/>
  <circle cx="1180" cy="-60" r="300" fill="none" stroke="#0B6E76" stroke-width="0.5" opacity="0.12"/>
  <circle cx="1180" cy="-60" r="480" fill="#0B6E76" opacity="0.06"/>

  <!-- Medium circle — bottom left -->
  <circle cx="80" cy="820" r="300" fill="none" stroke="#0B6E76" stroke-width="1" opacity="0.15"/>
  <circle cx="80" cy="820" r="380" fill="#0B6E76" opacity="0.05"/>

  <!-- Subtle dot grid pattern -->
  <g opacity="0.06" fill="#D4EEF0">
    <circle cx="100" cy="100" r="2"/><circle cx="160" cy="100" r="2"/><circle cx="220" cy="100" r="2"/><circle cx="280" cy="100" r="2"/><circle cx="340" cy="100" r="2"/>
    <circle cx="100" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="220" cy="160" r="2"/><circle cx="280" cy="160" r="2"/><circle cx="340" cy="160" r="2"/>
    <circle cx="100" cy="220" r="2"/><circle cx="160" cy="220" r="2"/><circle cx="220" cy="220" r="2"/><circle cx="280" cy="220" r="2"/>
    <circle cx="940" cy="500" r="2"/><circle cx="1000" cy="500" r="2"/><circle cx="1060" cy="500" r="2"/><circle cx="1120" cy="500" r="2"/>
    <circle cx="940" cy="560" r="2"/><circle cx="1000" cy="560" r="2"/><circle cx="1060" cy="560" r="2"/><circle cx="1120" cy="560" r="2"/>
    <circle cx="940" cy="620" r="2"/><circle cx="1000" cy="620" r="2"/><circle cx="1060" cy="620" r="2"/><circle cx="1120" cy="620" r="2"/>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="160" x2="280" y2="160" stroke="#0B6E76" stroke-width="1" opacity="0.3"/>
  <line x1="1000" y1="560" x2="1280" y2="560" stroke="#0B6E76" stroke-width="1" opacity="0.3"/>

  <!-- Wave at bottom -->
  <path d="M0 630 Q320 596 640 630 Q960 664 1280 630 L1280 720 L0 720 Z" fill="#0B6E76" opacity="0.10"/>
  <path d="M0 656 Q320 636 640 656 Q960 676 1280 656 L1280 720 L0 720 Z" fill="#D4EEF0" opacity="0.04"/>

  <!-- Tere Health wordmark — centered -->
  <text x="640" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-style="italic" font-weight="400"
    fill="#D4EEF0" text-anchor="middle" letter-spacing="6" opacity="0.92">Tere Health</text>

  <!-- Accent bar under logo -->
  <rect x="490" y="328" width="300" height="2" fill="#0B6E76" opacity="0.7"/>

  <!-- Tagline -->
  <text x="640" y="372" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400"
    fill="#D4EEF0" text-anchor="middle" letter-spacing="10" opacity="0.55">TELEHEALTH · NEW ZEALAND</text>

  <!-- Sub-tagline -->
  <text x="640" y="416" font-family="Georgia, serif" font-size="18" font-style="italic"
    fill="#D4EEF0" text-anchor="middle" letter-spacing="3" opacity="0.35">He tere, he ora</text>

  <!-- Small teal cross/plus marks — decorative -->
  <g fill="#0B6E76" opacity="0.35">
    <rect x="218" y="348" width="2" height="14"/><rect x="213" y="353" width="12" height="2"/>
    <rect x="1050" y="290" width="2" height="14"/><rect x="1045" y="295" width="12" height="2"/>
    <rect x="138" y="448" width="2" height="10"/><rect x="134" y="452" width="10" height="2"/>
    <rect x="1110" y="410" width="2" height="10"/><rect x="1106" y="414" width="10" height="2"/>
  </g>
</svg>
